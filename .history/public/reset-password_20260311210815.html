<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Nieuw wachtwoord | Studie4SU</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/login.css" />
  <link rel="stylesheet" href="css/forgot-password.css" />
</head>
<body>

  <main class="auth-page">

    <!-- Left quote panel -->
    <section class="quote-section fade-in" aria-live="polite">
      <p class="quote-text" id="quote-text">"Een nieuw begin is altijd mogelijk."</p>
      <p class="quote-book" id="quote-book">Studie4SU</p>
      <p class="quote-author" id="quote-author"></p>
    </section>

    <!-- Right panel -->
    <section class="login-panel slide-in" role="main">
      <div class="card">

        <div class="card-header">
          <div class="header-icon-wrap" aria-hidden="true">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
              <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
            </svg>
          </div>
          <h1 class="card-title" id="page-heading">Nieuw wachtwoord</h1>
          <p class="card-subtitle" id="page-subtitle">Kies een nieuw wachtwoord voor je account</p>

          <div class="lang-switcher" role="group" aria-label="Taal kiezen / Choose language">
            <button class="lang-btn active" id="btn-nl" onclick="setLanguage('nl')" aria-pressed="true">NL</button>
            <button class="lang-btn" id="btn-en" onclick="setLanguage('en')" aria-pressed="false">EN</button>
          </div>
        </div>

        <div class="card-body">

          <!-- Checking token state -->
          <div id="state-loading" class="token-state">
            <div class="spinner spinner--inline" aria-hidden="true"></div>
            <span id="loading-label">Link controleren…</span>
          </div>

          <!-- Invalid / expired token -->
          <div id="state-invalid" class="token-state token-state--error" hidden>
            <div class="state-icon" aria-hidden="true">❌</div>
            <p id="invalid-msg">Deze resetlink is verlopen of al gebruikt.</p>
            <a href="forgot-password.html" class="submit-btn" id="request-new-link" style="text-decoration:none;display:inline-flex;margin-top:1rem;">
              <span id="new-link-label">Nieuwe link aanvragen</span>
            </a>
          </div>

          <!-- Reset form -->
          <div id="state-form" hidden>
            <div class="api-banner" id="api-banner" role="alert"></div>
            <form id="reset-form" novalidate>

              <div class="field">
                <label for="new-password" id="new-password-label">Nieuw wachtwoord</label>
                <div class="input-wrap">
                  <svg class="input-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
                  <input type="password" id="new-password" name="new-password" autocomplete="new-password" required aria-required="true" aria-describedby="new-password-error" />
                  <button type="button" class="toggle-pw" id="toggle-pw1" onclick="togglePw('new-password','toggle-pw1')" aria-label="Wachtwoord tonen/verbergen">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
                  </button>
                </div>
                <div class="pw-strength" id="pw-strength" aria-live="polite"></div>
                <span class="error-msg" id="new-password-error" role="alert"></span>
              </div>

              <div class="field">
                <label for="confirm-password" id="confirm-label">Bevestig wachtwoord</label>
                <div class="input-wrap">
                  <svg class="input-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
                  <input type="password" id="confirm-password" name="confirm-password" autocomplete="new-password" required aria-required="true" aria-describedby="confirm-error" />
                  <button type="button" class="toggle-pw" id="toggle-pw2" onclick="togglePw('confirm-password','toggle-pw2')" aria-label="Wachtwoord tonen/verbergen">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
                  </button>
                </div>
                <span class="error-msg" id="confirm-error" role="alert"></span>
              </div>

              <button type="submit" class="submit-btn" id="submit-reset">
                <div class="spinner" id="spinner-reset" aria-hidden="true"></div>
                <span id="submit-reset-label">Wachtwoord opslaan</span>
                <svg id="submit-reset-arrow" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M5 12h14"/><path d="m12 5 7 7-7 7"/></svg>
              </button>

            </form>
          </div>

          <!-- Success state -->
          <div id="state-success" class="success-state" hidden>
            <div class="success-icon" aria-hidden="true">🎉</div>
            <h2 class="success-title" id="success-title">Wachtwoord gewijzigd!</h2>
            <p class="success-body" id="success-body">Je kunt nu inloggen met je nieuwe wachtwoord.</p>
            <a href="login.html" class="submit-btn" id="go-login" style="text-decoration:none;display:inline-flex;margin-top:1.25rem;">
              <span id="go-login-label">Naar inloggen</span>
              <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M5 12h14"/><path d="m12 5 7 7-7 7"/></svg>
            </a>
          </div>

        </div>
      </div>
    </section>

  </main>

  <script src="js/reset-password.js" defer></script>
</body>
</html>
