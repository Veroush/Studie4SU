<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Wachtwoord vergeten | Studie4SU</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/login.css" />
  <link rel="stylesheet" href="css/forgot-password.css" />
</head>
<body>

  <main class="auth-page">

    <!-- Left quote panel (same as login) -->
    <section class="quote-section fade-in" aria-live="polite">
      <p class="quote-text" id="quote-text">"Het begin is het belangrijkste deel van het werk."</p>
      <p class="quote-book" id="quote-book">De Republiek</p>
      <p class="quote-author" id="quote-author">by Plato</p>
    </section>

    <!-- Right panel -->
    <section class="login-panel slide-in" role="main">
      <div class="card">

        <div class="card-header">
          <div class="header-icon-wrap" aria-hidden="true">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
              <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
              <circle cx="12" cy="16" r="1" fill="currentColor"/>
            </svg>
          </div>
          <h1 class="card-title" id="page-heading">Wachtwoord vergeten</h1>
          <p class="card-subtitle" id="page-subtitle">Vul je e-mailadres in om een resetlink te ontvangen</p>

          <div class="lang-switcher" role="group" aria-label="Taal kiezen / Choose language">
            <button class="lang-btn active" id="btn-nl" onclick="setLanguage('nl')" aria-pressed="true">NL</button>
            <button class="lang-btn" id="btn-en" onclick="setLanguage('en')" aria-pressed="false">EN</button>
          </div>
        </div>

        <div class="card-body">

          <!-- API error banner -->
          <div class="api-banner" id="api-banner" role="alert"></div>

          <!-- EMAIL FORM -->
          <div id="panel-email">
            <form id="form-email" novalidate>
              <div class="field">
                <label for="email" id="email-label">E-mailadres</label>
                <div class="input-wrap">
                  <svg class="input-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect x="2" y="4" width="20" height="16" rx="2"/><path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/></svg>
                  <input type="email" id="email" name="email" autocomplete="email" required aria-required="true" aria-describedby="email-error" />
                </div>
                <span class="error-msg" id="email-error" role="alert"></span>
              </div>
              <button type="submit" class="submit-btn" id="submit-email">
                <div class="spinner" id="spinner-email" aria-hidden="true"></div>
                <span id="submit-email-label">Resetlink versturen</span>
                <svg id="submit-email-arrow" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M5 12h14"/><path d="m12 5 7 7-7 7"/></svg>
              </button>
            </form>
          </div>

          <!-- SUCCESS STATE (hidden until form submitted) -->
          <div id="success-state" class="success-state" hidden>
            <div class="success-icon" aria-hidden="true">✅</div>
            <h2 class="success-title" id="success-title">Link verstuurd!</h2>
            <p class="success-body" id="success-body">Controleer je inbox en klik op de link om je wachtwoord opnieuw in te stellen.</p>
          </div>

          <a href="login.html" class="back-link" id="back-link">← <span id="back-label">Terug naar inloggen</span></a>

        </div>
      </div>
    </section>

  </main>

  <script src="js/forgot-password.js" defer></script>
</body>
</html>
