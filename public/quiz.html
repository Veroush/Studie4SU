<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Studiekeuzequiz – Studie4SU</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/quiz.css" />
</head>
<body>

  <!-- ========== NAVBAR ========== -->
  <nav class="nav">
    <a href="index.html" class="nav-logo">Studie4SU</a>
    <div class="nav-lang">
      <button class="lang-btn" id="btn-nl" onclick="setLanguage('nl')">NL</button>
      <button class="lang-btn" id="btn-en" onclick="setLanguage('en')">EN</button>
    </div>
  </nav>

  <!-- Screen-reader live region -->
  <div id="sr-announcements" role="status" aria-live="polite" aria-atomic="true" class="sr-only"></div>

  <!-- ========================================================
       QUIZ SECTION
  ======================================================== -->
  <main>
    <div class="page" id="quiz-section">

      <!-- Page header -->
      <header class="page-header">
        <h1 id="page-title">Studiekeuzequiz</h1>
        <p id="page-subtitle">Beantwoord deze vragen om jouw ideale studie te vinden</p>
      </header>

      <!-- Progress bar -->
      <div class="progress-section" id="progress-section">
        <div class="progress-info">
          <span id="progress-text">Vraag 1 van 8</span>
          <span id="percentage-text">13%</span>
        </div>
        <div class="progress-track"
             role="progressbar"
             aria-valuenow="13" aria-valuemin="0" aria-valuemax="100"
             aria-label="Quiz voortgang">
          <div class="progress-fill" id="progress-fill"></div>
        </div>
      </div>

      <!-- Question card -->
      <div class="question-card" id="question-card">
        <h2 id="question-text"></h2>
        <p class="question-instruction" id="question-instruction"></p>
        <div class="options-list" id="options-list" role="group" aria-label="Antwoord opties"></div>
      </div>

      <!-- Navigation -->
      <div class="nav-row">
        <button class="btn-prev" id="prev-btn" onclick="handlePrevious()" disabled aria-label="Vorige vraag">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><polyline points="15 18 9 12 15 6"/></svg>
          <span id="prev-label">Vorige</span>
        </button>
        <button class="btn-next" id="next-btn" onclick="handleNext()" disabled aria-label="Volgende vraag">
          <span id="next-label">Volgende</span>
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><polyline points="9 18 15 12 9 6"/></svg>
        </button>
      </div>

    </div><!-- /.page #quiz-section -->


    <!-- ========================================================
         RESULTS SECTION
    ======================================================== -->
    <div class="page results-mode" id="results-container">

      <header class="results-header">
        <div>
          <div class="success-badge">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#15803d" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>
            <span id="badge-text">Quiz voltooid!</span>
          </div>
        </div>
        <h1 id="results-title">Jouw Gepersonaliseerde Aanbevelingen</h1>
        <p id="results-subtitle">Op basis van jouw opleidingsniveau, certificaten en voorkeuren</p>
      </header>

      <div class="recommendations-list" id="recommendations-list"></div>

      <div class="retake-row">
        <button class="btn-secondary" onclick="retakeQuiz()" id="retake-btn">Quiz Opnieuw Doen</button>
      </div>

    </div><!-- /#results-container -->
  </main>

  <script src="js/quiz.js"></script>
</body>
</html>
