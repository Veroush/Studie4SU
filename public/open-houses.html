<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Open Dagen | Studie4SU</title>
  
  <link rel="stylesheet" href="css/open-houses.css">
</head>
<body>

  <div id="sr-announcements" class="sr-only" role="status" aria-live="polite"></div>
  <div id="toast" class="toast" role="alert" aria-live="assertive"></div>

  <div class="page-wrapper">

    <div class="lang-row">
      <button class="lang-pill active" id="btn-nl" onclick="setLanguage('nl')" aria-pressed="true">NL</button>
      <button class="lang-pill"        id="btn-en" onclick="setLanguage('en')" aria-pressed="false">EN</button>
    </div>

    <header class="page-header">
      <h1 class="page-title" id="page-title">Open Dagen</h1>
      <p  class="page-subtitle" id="page-subtitle">Bezoek scholen en maak kennis met de opleidingen</p>
    </header>

    <div class="filter-bar-wrap">

      <div class="filter-group" role="tablist" aria-label="Filter evenementen">
        <button class="filter-btn active" data-filter="all"      role="tab" aria-selected="true"  onclick="setFilter('all')">Alle</button>
        <button class="filter-btn"        data-filter="upcoming" role="tab" aria-selected="false" onclick="setFilter('upcoming')">Aankomend</button>
        <button class="filter-btn"        data-filter="saved"    role="tab" aria-selected="false" onclick="setFilter('saved')">Opgeslagen</button>
      </div>

      <div class="view-group" role="tablist" aria-label="Weergavemodus">
        <button class="view-btn active" data-view="list"     role="tab" aria-selected="true"  onclick="setViewMode('list')">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>
          <span id="lbl-list">Lijst</span>
        </button>
        <button class="view-btn"        data-view="calendar" role="tab" aria-selected="false" onclick="setViewMode('calendar')">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/><line x1="8" y1="14" x2="8.01" y2="14"/><line x1="12" y1="14" x2="12.01" y2="14"/><line x1="16" y1="14" x2="16.01" y2="14"/></svg>
          <span id="lbl-calendar">Kalender</span>
        </button>
      </div>

    </div>

    <div id="list-view" class="events-grid" role="list" aria-label="Evenementen lijst"></div>

    <div id="calendar-view" role="list" aria-label="Evenementen kalender"></div>

    <div id="empty-state" aria-live="polite">
      <svg class="empty-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <rect x="3" y="4" width="18" height="18" rx="2" ry="2"/>
        <line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/>
      </svg>
      <p class="empty-msg" id="empty-msg">Geen open dagen gevonden</p>
    </div>

  </div>

  <script src="js/open-houses.js"></script>
</body>
</html>
